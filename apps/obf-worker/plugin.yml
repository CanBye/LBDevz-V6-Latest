name: GeceGorus
version: 1.0.0
main: com.lbdevz.loader.LoaderPlugin
api-version: "1.20"
author: LBDevz
description: Oyuncularınıza /gecegorus komutu ile gece görüşü efekti verin.
website: https://lbdevz.com

commands:
  gecegorus:
    description: Gece görüşü efektini açar/kapatır.
    usage: /gecegorus [ver <oyuncu> | kapat]
    permission: gecegorus.use

permissions:
  gecegorus.use:
    description: /gecegorus komutunu kullanma izni
    default: op